<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Add App - The Little AI App Planet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="admin-page">
    <main class="admin-shell">
      <header class="admin-top">
        <a class="brand admin-brand" href="index.html#top" aria-label="Back to The Little AI App Planet">
          <span class="brand-orbit small" aria-hidden="true"><span></span></span>
          <span>Little AI Planet</span>
        </a>
        <a class="admin-back" href="index.html#apps">Back to apps</a>
      </header>

      <section class="admin-hero" aria-labelledby="admin-title">
        <p class="section-kicker">Mission control</p>
        <h1 id="admin-title">Add a new app</h1>
        <p>
          Submit an app entry to the Cloudflare Pages Function. The function updates
          <code>data/apps.json</code> in GitHub and creates a commit on <code>main</code>.
        </p>
      </section>

      <form class="admin-panel admin-form" id="app-form">
        <section class="admin-section">
          <h2>Access</h2>
          <label>
            Admin secret
            <input name="adminSecret" type="password" autocomplete="current-password" required />
          </label>
        </section>

        <section class="admin-section">
          <h2>App details</h2>
          <div class="admin-grid">
            <label>
              Date
              <input name="date" type="date" required />
            </label>
            <label>
              Platform
              <input name="platform" type="text" placeholder="Website, Python, iOS..." required />
            </label>
          </div>
          <label>
            Title
            <input name="title" type="text" required />
          </label>
          <label>
            Description
            <textarea name="description" rows="3" required></textarea>
          </label>
          <div class="admin-grid">
            <label>
              App image
              <input name="imageFile" type="file" accept="image/png" required />
              <span class="field-hint">Upload a PNG. The file name becomes the JSON image value.</span>
            </label>
            <label>
              AI
              <input name="AI" type="text" placeholder="Codex, GPT 5.5, high" required />
            </label>
          </div>
          <div class="image-preview" id="image-preview" hidden>
            <img alt="Selected app preview" />
            <span></span>
          </div>
          <div class="admin-grid">
            <label>
              Website URL
              <input name="website" type="url" placeholder="https://example.com" />
            </label>
            <label>
              GitHub URL
              <input name="GitHub" type="url" placeholder="https://github.com/..." />
            </label>
          </div>
        </section>

        <section class="admin-section">
          <h2>Prompts and notes</h2>
          <div class="array-field" data-array-field="prompt">
            <div class="array-field-top">
              <div>
                <span class="array-label">Key prompts</span>
                <span class="field-hint">Add one prompt per row.</span>
              </div>
              <button class="button array-add" type="button" data-array-add="prompt">Add prompt</button>
            </div>
            <div class="array-list" data-array-list="prompt"></div>
          </div>
          <div class="array-field" data-array-field="notes">
            <div class="array-field-top">
              <div>
                <span class="array-label">Notes</span>
                <span class="field-hint">Add one note per row.</span>
              </div>
              <button class="button array-add" type="button" data-array-add="notes">Add note</button>
            </div>
            <div class="array-list" data-array-list="notes"></div>
          </div>
        </section>

        <div class="admin-actions">
          <button class="button button-primary" type="submit">Add app</button>
          <p class="admin-status" id="admin-status" role="status" aria-live="polite"></p>
        </div>
      </form>
    </main>
    <script src="admin.js"></script>
  </body>
</html>
